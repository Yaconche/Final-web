<script>
  var contactMessageTimer;

  function resetContactMessages(form) {
    var loading = form.querySelector('.loading');
    var errorMessage = form.querySelector('.error-message');
    var sentMessage = form.querySelector('.sent-message');
    var submitButton = form.querySelector('button[type="submit"]');

    loading.style.display = 'none';
    errorMessage.style.display = 'none';
    errorMessage.textContent = '';
    sentMessage.style.display = 'none';
    submitButton.style.display = '';
    submitButton.disabled = false;
  }

  document.getElementById('google-contact-form').addEventListener('submit', function(e) {
    e.preventDefault(); // 阻止網頁跳轉
    
    var form = this;
    var loading = form.querySelector('.loading');
    var errorMessage = form.querySelector('.error-message');
    var sentMessage = form.querySelector('.sent-message');
    var submitButton = form.querySelector('button[type="submit"]');

    clearTimeout(contactMessageTimer);
    
    // 顯示 Loading，隱藏其他提示
    loading.style.display = 'block';
    errorMessage.style.display = 'none';
    errorMessage.textContent = '';
    sentMessage.style.display = 'none';
    submitButton.style.display = 'none';
    submitButton.disabled = true;
    
    // 封裝表單資料
    var formData = new FormData(form);
    var searchParams = new URLSearchParams();
    for (var pair of formData) {
        searchParams.append(pair[0], pair[1]);
    }
    
    // 用 fetch 發送 POST 請求到 Google GAS
    fetch(form.action, {
        method: 'POST',
        mode: 'no-cors',
        body: searchParams,
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
        }
    })
    .then(() => {
        loading.style.display = 'none';
        sentMessage.style.display = 'block'; // 顯示成功畫面
        form.reset(); // 清空表單
        contactMessageTimer = setTimeout(function() {
            resetContactMessages(form);
        }, 5000);
    })
    .catch(() => {
        loading.style.display = 'none';
        resetContactMessages(form);
    });
  });
</script>
